 max-width: 200px; text-align: center;"><span class="edgeLabel"><p>C items</p></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_H_F_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default" id="flowchart-A-0" transform="translate(291.55078125, 71)"><rect class="basic label-container" style="" x="-130" y="-63" width="260" height="126"/><g class="label" style="" transform="translate(-100, -48)"><rect/><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p><b>Step 1: Export Data</b><br />162K template rows + 311K dropdown values<br />from Epic Clarity</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-B-1" transform="translate(291.55078125, 283)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p><b>Step 2: Build Formal Context</b><br />Deduplicate to ~56K items<br />Parse names, classify templates + value domains<br />Output: items x ~300 binary attributes</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-C-3" transform="translate(291.55078125, 507)"><rect class="basic label-container" style="" x="-130" y="-75" width="260" height="150"/><g class="label" style="" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p><b>Step 3: Compute Lattice</b><br />NextClosure algorithm finds all maximal groups<br />sharing identical properties (2-pass)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-D-5" transform="translate(291.55078125, 731)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p><b>Step 4: Classify Concepts</b><br />A = Atomic (~16K) — standalone clinical item<br />B = Compositional (~1.5K) — has body site qualifier<br />C = Unmappable (~38K) — no assessment detected</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-E-7" transform="translate(138, 979)"><rect class="basic label-container" style="" x="-130" y="-75" width="260" height="150"/><g class="label" style="" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p><b>Step 5: Generate Mapping CSVs</b><br />atomic_items.csv + compositional_mapping.csv<br />+ unmappable_items.csv</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-F-9" transform="translate(291.55078125, 1203)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p><b>Step 6: Build mapping.csv</b><br />Merge FCA outputs + existing hand-curated mappings<br />B items get multi-row entries (observation + qualifier)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-G-11" transform="translate(291.55078125, 1403)"><rect class="basic label-container" style="" x="-130" y="-51" width="260" height="102"/><g class="label" style="" transform="translate(-100, -36)"><rect/><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p><b>Step 7: Validate</b><br />Completeness, consistency, lattice validity</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-H-14" transform="translate(445.1015625, 979)"><rect class="basic label-container" style="" x="-127.1015625" y="-51" width="254.203125" height="102"/><g class="label" style="" transform="translate(-97.1015625, -36)"><rect/><foreignObject width="194.203125" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p><b>Clinical Review Pass</b><br />LLM + OHDSI vocab lookups<br />rescue ~10K items from C</p></span></div></foreignObject></g></g></g></g></g></svg>